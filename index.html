<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus 5 Desktop</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --glass: rgba(10, 15, 30, 0.9); --border: rgba(255,255,255,0.1); --accent: #3b82f6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; font-family: 'Inter', sans-serif; color: white; }
        
        .desktop { height: 100vh; width: 100vw; background: radial-gradient(circle at center, #1e293b, #000); position: relative; }

        /* DESKTOP FOLDERS */
        .icon-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 40px 20px; }
        .node { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .folder-icon { width: 60px; height: 60px; background: rgba(59, 130, 246, 0.2); border: 1px solid rgba(59, 130, 246, 0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .node-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }

        /* EXPLORER WINDOW */
        .win { position: absolute; inset: 60px 15px 90px 15px; z-index: 100; display: none; flex-direction: column; background: var(--glass); backdrop-filter: blur(40px); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
        .win.active { display: flex; }
        .win-bar { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); }
        .win-body { flex: 1; padding: 20px; overflow-y: auto; }

        /* FILE LIST */
        .file-list { display: flex; flex-direction: column; gap: 10px; }
        .file-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 10px; font-family: monospace; font-size: 12px; }
        
        .taskbar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(0,0,0,0.9); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; }
    </style>
</head>
<body>

    <div class="desktop">
        <div class="icon-grid">
            <div class="node" onclick="ui.toggle('explorer')">
                <div class="folder-icon"><i data-lucide="folder" color="#3b82f6"></i></div>
                <span class="node-label">Root_Drive</span>
            </div>
            <div class="node" onclick="ui.toggle('term')">
                <div class="folder-icon" style="background:rgba(129, 140, 248, 0.2); border-color:rgba(129, 140, 248, 0.4);"><i data-lucide="terminal" color="#818cf8"></i></div>
                <span class="node-label">Terminal</span>
            </div>
        </div>

        <div id="explorer" class="win">
            <div class="win-bar">
                <span style="font-size:10px; font-weight:900;">EXPLORER: /ROOT</span>
                <i data-lucide="x" onclick="ui.toggle('explorer')" style="cursor:pointer"></i>
            </div>
            <div class="win-body">
                <div style="margin-bottom:20px; display:flex; gap:10px;">
                    <label style="background:var(--accent); padding:10px 15px; border-radius:8px; font-size:11px; font-weight:bold; cursor:pointer;">
                        IMPORT FILE <input type="file" id="file-input" style="display:none;" onchange="fs.import(this)">
                    </label>
                    <button onclick="fs.clear()" style="background:rgba(248,113,113,0.2); border:1px solid #f87171; color:#f87171; padding:8px 15px; border-radius:8px; font-size:11px;">WIPE DRIVE</button>
                </div>
                <div id="file-display" class="file-list">
                    <div style="opacity:0.3; text-align:center; padding:40px;">Drive Empty.</div>
                </div>
            </div>
        </div>

        <div class="taskbar">
            <span style="font-size:10px; opacity:0.4; font-weight:bold;">NEXUS_SYS_v4</span>
            <span id="clock" style="font-size:11px; opacity:0.4;">00:00</span>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const ui = {
            toggle: (id) => document.getElementById(id).classList.toggle('active')
        };

        const fs = {
            // Local Storage used for persistence in this demo
            // Can be upgraded to IndexedDB for large files
            db: JSON.parse(localStorage.getItem('nexus_fs') || '[]'),
            
            save: () => localStorage.setItem('nexus_fs', JSON.stringify(fs.db)),
            
            import: (input) => {
                const file = input.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (e) => {
                    fs.db.push({ name: file.name, size: file.size, type: file.type, date: new Date().toLocaleDateString() });
                    fs.save();
                    fs.render();
                };
                reader.readAsDataURL(file);
            },

            clear: () => {
                if(confirm("Confirm system wipe?")) {
                    fs.db = [];
                    fs.save();
                    fs.render();
                }
            },

            render: () => {
                const container = document.getElementById('file-display');
                if (fs.db.length === 0) {
                    container.innerHTML = '<div style="opacity:0.3; text-align:center; padding:40px;">Drive Empty.</div>';
                    return;
                }
                container.innerHTML = fs.db.map(f => `
                    <div class="file-item">
                        <i data-lucide="file-text" size="14" style="opacity:0.5"></i>
                        <div style="flex:1">
                            <div>${f.name}</div>
                            <div style="font-size:9px; opacity:0.4;">${(f.size/1024).toFixed(1)} KB | ${f.date}</div>
                        </div>
                        <i data-lucide="more-vertical" size="14" style="opacity:0.3"></i>
                    </div>
                `).join('');
                lucide.createIcons();
            }
        };

        // Init
        fs.render();
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        }, 1000);
    </script>
</body>
</html>
